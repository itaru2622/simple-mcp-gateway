#
# mcp server configuration
# '${...}' will be replaced by the value of corresponding environment variable at runtime.
#
mcpServers:
  echo:
    transport: stdio
    command: fastmcp
    args:
      - run
      - --server-spec
      - ${wDir}/sample/mcp-servers/echo.py
      - --transport
      - stdio
