#
# mcp server configuration
# '${...}' will be replaced by the value of corresponding environment variable at runtime.
#
mcpServers:
  github-full:
    transport: stdio
    command: docker
    args:
      - run
      - -i
      - --rm
      - -e
      - GITHUB_PERSONAL_ACCESS_TOKEN
      - ghcr.io/github/github-mcp-server
      - stdio
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GH_MCP_PAT_FULLACCESS}

