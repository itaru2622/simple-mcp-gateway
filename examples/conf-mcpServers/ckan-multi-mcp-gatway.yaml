# https://github.com/ondics/ckan-mcp-server
# https://github.com/japan-opendata/awesome-japan-opendata
#
# CKAN_URL:
#  - https://demo.ckan.org
#  - https://catalog.data.metro.tokyo.lg.jp
#  - https://catalog.opendata.pref.kanagawa.jp
#  - https://data.bodik.jp
#  - https://www.geospatial.jp/ckan
#  - https://search.ckan.jp CKAN_PATH_PREFIX=/backend/api/  # proprietary responce scheam/API, federated ckan server !?
#

mcpServers:
   ckan_tokyo:
     transport: stdio
     command: docker
     args:
       - run
       - -i
       - -e
       - CKAN_URL=https://catalog.data.metro.tokyo.lg.jp
       - -e
       - LOG_LEVEL=DEBUG
       - itaru2622/ckan-mcp:trixie

   ckan_kanagawa:
     transport: stdio
     command: docker
     args:
       - run
       - -i
       - -e
       - CKAN_URL=https://catalog.opendata.pref.kanagawa.jp
       - -e
       - LOG_LEVEL=DEBUG
       - itaru2622/ckan-mcp:trixie
       
   ckan_federated:
     transport: stdio
     command: docker
     args:
       - run
       - -i
       - -e
       - CKAN_URL=https://search.ckan.jp
       - -e
       - LOG_LEVEL=DEBUG
       - -e
       - CKAN_PATH_PREFIX=/backend/api/
       - itaru2622/ckan-mcp:trixie

